name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TradeLike.Api/TradeLike.Api.csproj

      - name: Build
        run: dotnet build TradeLike.Api/TradeLike.Api.csproj -c Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Recurse -Filter *Tests.csproj
          if ($testProjects) {
            foreach ($project in $testProjects) {
              dotnet test $project.FullName -c Release --no-build
            }
          } else {
            "No test projects found."
          }

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
