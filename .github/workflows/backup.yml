name: Database backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    name: Backup database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install sqlpackage
        run: |
          curl -sSL -o sqlpackage.zip https://aka.ms/sqlpackage-linux
          unzip -q sqlpackage.zip -d "$HOME/sqlpackage"
          chmod +x "$HOME/sqlpackage/sqlpackage"
          echo "$HOME/sqlpackage" >> "$GITHUB_PATH"

      - name: Run backup
        env:
          BACKUP_BLOB_URI: ${{ secrets.BACKUP_BLOB_URI }}
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
        run: bash ops/backup-db.sh
